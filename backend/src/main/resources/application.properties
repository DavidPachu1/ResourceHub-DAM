spring.application.name=ResourceHub

# --- CONEXION A BASE DE DATOS (DOCKER) ---
spring.datasource.url=jdbc:mysql://localhost:3307/resourcehub_db?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- FLYWAY Y JPA ---
#  Para que Hibernate no rompa nada, dejamos que Flyway mande
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.fail-on-missing-locations=true
debug=true