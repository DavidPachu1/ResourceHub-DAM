spring.application.name=ResourceHub

# ==========================================
# 1. CONFIGURACIÓN DE LA BASE DE DATOS
# ==========================================
# Fíjate en el final: ?createDatabaseIfNotExist=true
# Esto OBLIGA a MySQL a crear la DB si no la encuentra.
spring.datasource.url=jdbc:mysql://localhost:3307/resourcehub_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# ==========================================
# 2. GESTIÓN DE TABLAS (HIBERNATE)
# ==========================================
# update: Crea las tablas si no existen
spring.jpa.hibernate.ddl-auto=update
# true: Para ver en la consola el SQL que genera
spring.jpa.show-sql=true
# MySQL8Dialect: Ayuda a Hibernate a no perderse
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# 3. MIGRACIONES (FLYWAY - DESACTIVADO)
# ==========================================
# Lo apagamos para que Hibernate pueda trabajar tranquilo
spring.flyway.enabled=false

# ==========================================
# 4. SEGURIDAD JWT (Tu clave secreta)
# ==========================================
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=86400000